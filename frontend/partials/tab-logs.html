<div x-show="currentView === 'logs'" x-cloak>
  <div class="section-header">
    <div>
      <div class="section-title">Logs</div>
      <div class="section-sub">Server-wide application log, auto-refreshing every 5 seconds.</div>
    </div>
  </div>

  <div class="space-y-4">
    <div class="card">
      <div class="flex flex-col gap-3">
        <input
          x-model="globalLogRunId"
          @change="loadGlobalLogs()"
          class="field-input"
          data-testid="logs-run-id-input"
          placeholder="Filter to a run ID… (optional)"
        />
        <input
          x-model="globalLogFilterQuery"
          class="field-input"
          data-testid="logs-search-input"
          placeholder="Search logs… (live)"
        />
        <div class="flex gap-2 flex-wrap items-center">
          <button data-testid="logs-level-chip-ALL" class="level-chip" :class="globalLogFilterLevel === '' ? 'chip-active-ALL' : ''" @click="globalLogFilterLevel = ''">ALL</button>
          <button data-testid="logs-level-chip-ERROR" class="level-chip" :class="globalLogFilterLevel === 'ERROR' ? 'chip-active-ERROR' : ''" @click="globalLogFilterLevel = globalLogFilterLevel === 'ERROR' ? '' : 'ERROR'">ERROR</button>
          <button data-testid="logs-level-chip-WARN" class="level-chip" :class="globalLogFilterLevel === 'WARNING' ? 'chip-active-WARNING' : ''" @click="globalLogFilterLevel = globalLogFilterLevel === 'WARNING' ? '' : 'WARNING'">WARN</button>
          <button data-testid="logs-level-chip-INFO" class="level-chip" :class="globalLogFilterLevel === 'INFO' ? 'chip-active-INFO' : ''" @click="globalLogFilterLevel = globalLogFilterLevel === 'INFO' ? '' : 'INFO'">INFO</button>
          <button data-testid="logs-level-chip-DEBUG" class="level-chip" :class="globalLogFilterLevel === 'DEBUG' ? 'chip-active-DEBUG' : ''" @click="globalLogFilterLevel = globalLogFilterLevel === 'DEBUG' ? '' : 'DEBUG'">DEBUG</button>
          <span data-testid="logs-counter" class="text-muted text-xs ml-2" x-text="filteredGlobalLogEvents().length + ' / ' + globalLogEvents.length + ' events'"></span>
        </div>
      </div>
    </div>

    <template x-if="globalLogsLoading">
      <div class="card empty-state"><div class="empty-state-title">Loading logs…</div></div>
    </template>

    <template x-if="!globalLogsLoading && globalLogEvents.length === 0">
      <div class="card empty-state"><div class="empty-state-title">No log events yet.</div></div>
    </template>

    <template x-if="!globalLogsLoading && globalLogEvents.length > 0">
      <div class="card p-0 overflow-hidden">
        <div class="log-list global-log-list">
          <template x-if="filteredGlobalLogEvents().length === 0">
            <div class="empty-state"><div class="empty-state-title">No events match the current filter.</div></div>
          </template>
          <template x-for="line in filteredGlobalLogEvents()" :key="line.number">
            <div class="log-entry" :class="logLevelClass(line.level)">
              <div class="log-entry-meta">
                <span class="font-mono" x-text="'#' + line.number"></span>
                <span class="badge" x-text="line.level"></span>
              </div>
              <pre x-html="highlightMatch(line.text, globalLogFilterQuery)"></pre>
            </div>
          </template>
        </div>
      </div>
    </template>
  </div>
</div>
