<div x-show="currentView === 'monitor'" x-cloak>
  <div class="section-header">
    <div>
      <div class="section-title">Execution Monitor</div>
      <div class="section-sub">Live progress of running and recent tests</div>
    </div>
    <div class="flex items-center gap-2 text-muted">
      <span class="w-2 h-2 rounded-full bg-emerald-400 inline-block animate-pulse"></span>
      SSE stream with 5s fallback
    </div>
  </div>

  <template x-if="activeRuns.length === 0">
    <div class="card empty-state">
      <div class="empty-state-icon">📡</div>
      <div class="empty-state-title">No active runs</div>
      <div class="empty-state-sub">
        <button @click="currentView='jobs'" data-testid="monitor-launch-link" class="text-indigo-500 hover:underline">Launch a test →</button>
      </div>
    </div>
  </template>

  <div class="space-y-4">
    <template x-for="run in activeRuns" :key="run.run_id">
      <div class="card" :data-testid="'monitor-run-' + run.run_id">
        <div class="flex items-start justify-between mb-4">
          <div>
            <div class="flex items-center gap-2">
              <span class="font-mono text-sm text-slate-400" x-text="run.run_id.substring(0,8)+'…'"></span>
              <span class="badge" :class="statusBadgeClass(run.status)" :data-testid="'monitor-run-status-' + run.run_id" x-text="run.status"></span>
            </div>
            <div class="text-muted mt-1">
              <span x-text="run.source_env||'?'"></span> → <span x-text="run.target_env||'?'"></span>
              <span class="ml-2" x-text="run.started_at ? 'Started ' + fmtDate(run.started_at) : 'Pending…'"></span>
            </div>
            <template x-if="run._progress && run._progress.current_job">
              <div class="text-muted mt-1 text-xs">
                Running: <span class="font-mono text-indigo-600" x-text="run._progress.current_job"></span>
              </div>
            </template>
          </div>
          <div class="text-right space-y-2">
            <div class="text-2xl font-bold text-slate-700" x-text="run.total_tests"></div>
            <div class="text-muted">tests</div>
            <button @click="cancelRun(run.run_id)"
                    x-show="!isTerminalStatus(run.status)"
                    :disabled="cancellingRuns[run.run_id] || run.cancel_requested"
                    :data-testid="'monitor-cancel-btn-' + run.run_id"
                    class="btn-danger btn-sm text-xs disabled:opacity-50"
                    x-text="run.cancel_requested ? 'Cancel requested' : (cancellingRuns[run.run_id] ? 'Cancelling...' : 'Cancel')"></button>
          </div>
        </div>

        <!-- Progress bar -->
        <div class="progress-track mb-4">
          <div class="progress-fill" :style="'width:' + runProgress(run) + '%'"></div>
        </div>

        <!-- Stat mini-cards -->
        <div class="grid-stat">
          <div class="stat-card stat-emerald">
            <div class="stat-card-label">Passed</div>
            <div class="stat-card-value" x-text="run.passed"></div>
          </div>
          <div class="stat-card stat-rose">
            <div class="stat-card-label">Failed</div>
            <div class="stat-card-value" x-text="run.failed"></div>
          </div>
          <div class="stat-card stat-amber">
            <div class="stat-card-label">Slow</div>
            <div class="stat-card-value" x-text="run.slow"></div>
          </div>
          <div class="stat-card stat-indigo">
            <div class="stat-card-label">Error</div>
            <div class="stat-card-value" x-text="run.error"></div>
          </div>
        </div>

        <!-- Step timeline (shown when run has step data) -->
        <template x-if="runStepsCache[run.run_id] && runStepsCache[run.run_id].length > 0">
          <div class="mt-4">
            <div class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Execution Steps</div>
            <div class="space-y-1.5">
              <template x-for="step in runStepsCache[run.run_id]" :key="step.step_index">
                <div class="flex items-center gap-3 px-3 py-2 rounded-lg bg-slate-50 border border-slate-100">
                  <span class="text-xs font-bold text-slate-400 w-5 text-center" x-text="step.step_index + 1"></span>
                  <span class="flex-1 text-sm font-medium text-slate-700" x-text="step.job_name"></span>
                  <span class="badge text-xs" :class="stepStatusBadgeClass(step.status)" x-text="step.status"></span>
                  <template x-if="step.status === 'HELD'">
                    <button @click="openStepRelease(run.run_id, step.step_index)" class="btn-primary btn-sm text-xs py-1 px-3">Release</button>
                  </template>
                </div>
              </template>
            </div>
          </div>
        </template>

        <!-- HELD alert -->
        <template x-if="run._progress && run._progress.held_step != null">
          <div class="mt-3 flex items-center gap-3 p-3 rounded-lg bg-amber-50 border border-amber-200">
            <span class="text-amber-600 font-semibold text-sm">⏸ Sequence held at step <span x-text="(run._progress.held_step + 1)"></span></span>
            <button @click="loadRunSteps(run.run_id)" class="btn-secondary btn-sm text-xs">Load steps</button>
          </div>
        </template>
      </div>
    </template>
  </div>
</div>
