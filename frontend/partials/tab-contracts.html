<div x-show="currentView === 'contracts'" x-cloak>
  <div class="section-header">
    <div>
      <div class="section-title">Data Contracts</div>
      <div class="section-sub">Manage data contracts, track breach history, and enforce SLAs</div>
    </div>
    <div class="flex gap-2">
      <button @click="showContractExamples = !showContractExamples" class="btn-outline btn-sm" :class="showContractExamples ? 'bg-indigo-50 border-indigo-300' : ''">Examples</button>
      <button data-testid="contracts-new-btn" @click="openNewContractModal()" class="btn-primary btn-sm">+ New Contract</button>
    </div>
  </div>

  <!-- Example contracts (industry-standard templates) -->
  <div x-show="showContractExamples" x-cloak class="mt-4">
    <div class="text-xs font-semibold text-slate-500 uppercase mb-2">Example contracts — click "Use example" to prefill the form, or expand to see schema, quality &amp; usage</div>
    <div class="grid gap-3" style="grid-template-columns:repeat(auto-fill,minmax(340px,1fr))">
      <template x-for="ex in contractExamples" :key="ex.id">
        <div class="card">
          <div class="flex items-start justify-between gap-2">
            <div>
              <div class="text-sm font-semibold text-slate-800" x-text="ex.title"></div>
              <div class="text-xs text-slate-500 mt-0.5" x-text="ex.summary"></div>
            </div>
            <button @click="useContractExample(ex)" class="btn-primary btn-sm text-xs flex-shrink-0">Use example</button>
          </div>
          <div class="flex flex-wrap gap-1 mt-2">
            <span class="text-[11px] font-medium px-1.5 py-0.5 rounded bg-slate-100 text-slate-600" x-text="'job: ' + ex.contract.source_job"></span>
            <span class="text-[11px] font-medium px-1.5 py-0.5 rounded bg-slate-100 text-slate-600" x-text="'SLA: ' + ex.contract.sla_hours + 'h'"></span>
            <span class="text-[11px] font-medium px-1.5 py-0.5 rounded bg-slate-100 text-slate-600" x-text="ex.contract.breach_severity"></span>
            <span class="text-[11px] font-medium px-1.5 py-0.5 rounded bg-slate-100 text-slate-600" x-text="ex.schema.length + ' fields'"></span>
          </div>
          <button @click="expandedExampleId = (expandedExampleId === ex.id ? null : ex.id)" class="text-xs text-indigo-600 hover:underline mt-2" x-text="expandedExampleId === ex.id ? 'Hide usage' : 'How to create &amp; use'"></button>
          <div x-show="expandedExampleId === ex.id" class="mt-2 space-y-3">
            <div>
              <div class="text-[11px] font-semibold text-slate-500 uppercase mb-1">Schema (with examples)</div>
              <table class="w-full text-xs">
                <thead>
                  <tr class="text-slate-400 text-left">
                    <th class="py-1 pr-2 font-medium">Field</th>
                    <th class="py-1 pr-2 font-medium">Type</th>
                    <th class="py-1 pr-2 font-medium">Example</th>
                    <th class="py-1 font-medium">Description</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="f in ex.schema" :key="f.name">
                    <tr class="border-t border-slate-100">
                      <td class="py-1 pr-2 font-medium text-slate-700" x-text="f.name + (f.required ? ' *' : '')"></td>
                      <td class="py-1 pr-2 text-slate-500" x-text="f.type"></td>
                      <td class="py-1 pr-2 text-slate-500 font-mono" x-text="f.example"></td>
                      <td class="py-1 text-slate-500" x-text="f.description"></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
            <div>
              <div class="text-[11px] font-semibold text-slate-500 uppercase mb-1">Quality rules</div>
              <ul class="list-disc list-inside text-xs text-slate-600 space-y-0.5">
                <template x-for="q in ex.quality" :key="q"><li x-text="q"></li></template>
              </ul>
            </div>
            <div>
              <div class="text-[11px] font-semibold text-slate-500 uppercase mb-1">How to create &amp; use</div>
              <pre class="text-[11px] text-slate-700 bg-slate-50 rounded p-2 whitespace-pre-wrap" x-text="ex.usage"></pre>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>

  <div x-show="contractsLoading" class="text-slate-400 text-sm py-4">Loading contracts…</div>

  <div x-show="!contractsLoading" class="flex gap-4 mt-4">
    <!-- Contract list -->
    <div class="card" style="min-width:280px;max-width:320px;flex-shrink:0">
      <div class="text-xs font-semibold text-slate-500 uppercase mb-2">Contracts (<span x-text="contracts.length"></span>)</div>
      <div x-show="contracts.length === 0" class="text-slate-400 text-sm py-2">No contracts yet.</div>
      <template x-for="c in contracts" :key="c.name">
        <div :data-testid="'contract-row-' + c.name" @click="selectContract(c)"
             :class="selectedContract && selectedContract.name === c.name ? 'bg-indigo-50 border-indigo-300' : 'hover:bg-slate-50 border-transparent'"
             class="flex items-center justify-between p-2 rounded border cursor-pointer mb-1 transition-colors">
          <div>
            <div class="text-sm font-medium text-slate-800" x-text="c.name"></div>
            <div class="text-xs text-slate-500" x-text="'&rarr; ' + c.source_job"></div>
          </div>
          <span :class="{
            'text-emerald-700 bg-emerald-50': (contractStatusMap[c.name] || {}).status === 'OK',
            'text-rose-700 bg-rose-50': (contractStatusMap[c.name] || {}).status === 'BREACHED',
            'text-orange-700 bg-orange-50': (contractStatusMap[c.name] || {}).status === 'OVERDUE',
            'text-slate-500 bg-slate-100': !['OK','BREACHED','OVERDUE'].includes((contractStatusMap[c.name] || {}).status),
          }" class="text-xs font-semibold px-2 py-0.5 rounded" x-text="(contractStatusMap[c.name] || {}).status || '...'"></span>
        </div>
      </template>
    </div>

    <!-- Contract detail -->
    <div class="flex-1" x-show="selectedContract">
      <template x-if="selectedContract">
        <div class="space-y-4">
          <!-- Header -->
          <div class="card">
            <div class="flex items-start justify-between">
              <div>
                <div class="text-base font-semibold text-slate-900" x-text="selectedContract.name"></div>
                <div class="text-xs text-slate-500 mt-0.5">
                  Source job: <span class="font-medium text-slate-700" x-text="selectedContract.source_job"></span>
                  &nbsp;&middot;&nbsp; Owner: <span class="font-medium text-slate-700" x-text="selectedContract.owner"></span>
                  &nbsp;&middot;&nbsp; SLA: <span class="font-medium text-slate-700" x-text="selectedContract.sla_hours + 'h'"></span>
                  &nbsp;&middot;&nbsp; v<span x-text="selectedContract.version"></span>
                </div>
                <div class="text-xs text-slate-400 mt-0.5">
                  Consumers: <span x-text="(selectedContract.consumers || []).join(', ') || 'none'"></span>
                </div>
              </div>
              <div class="flex gap-2">
                <button @click="openEditContractModal(selectedContract)" class="btn-outline btn-sm text-xs">Edit</button>
                <button data-testid="contract-delete-btn" @click="deleteContract(selectedContract.name)" class="btn-danger btn-sm text-xs">Delete</button>
              </div>
            </div>
          </div>

          <!-- Breach history -->
          <div class="card">
            <div class="text-xs font-semibold text-slate-500 uppercase mb-2">Breach History</div>
            <div x-show="contractBreachLoading" class="text-slate-400 text-sm">Loading...</div>
            <div x-show="!contractBreachLoading && contractBreachHistory.length === 0" class="text-slate-400 text-sm">No breaches recorded.</div>
            <template x-for="b in contractBreachHistory" :key="b.id">
              <div class="flex items-center gap-3 py-1.5 border-b border-slate-100 text-xs">
                <span :class="b.resolved_at ? 'text-slate-400' : 'text-rose-600'" class="font-medium w-20 flex-shrink-0" x-text="b.resolved_at ? 'Resolved' : 'Open'"></span>
                <span class="text-slate-600" x-text="b.breach_type"></span>
                <span class="text-slate-400 flex-1" x-text="b.opened_at ? fmtDate(b.opened_at) : ''"></span>
                <span x-show="b.duration_hours != null" class="text-slate-500" x-text="b.duration_hours != null ? b.duration_hours.toFixed(2) + 'h' : ''"></span>
                <span x-show="b.escalated" class="text-orange-600 font-semibold">ESCALATED</span>
              </div>
            </template>
          </div>

          <!-- Version bump -->
          <div class="card">
            <div class="text-xs font-semibold text-slate-500 uppercase mb-2">Bump Version</div>
            <div class="flex gap-2 items-center">
              <select data-testid="contract-bump-type-select" x-model="contractBumpType" class="field-input field-select text-sm" style="width:120px">
                <option value="minor">Minor</option>
                <option value="major">Major</option>
              </select>
              <input data-testid="contract-bump-note-input" x-model="contractBumpNote" type="text" placeholder="Note (optional)" class="field-input text-sm flex-1" />
              <button data-testid="contract-bump-btn" @click="bumpContractVersion(selectedContract.name)" :disabled="contractBumpLoading" class="btn-primary btn-sm text-xs">Bump</button>
            </div>
            <div x-show="contractVersionHistory.length > 0" class="mt-3">
              <div class="text-xs text-slate-500 mb-1">Version history</div>
              <template x-for="v in contractVersionHistory" :key="v.id">
                <div class="flex items-center gap-3 text-xs py-0.5 border-b border-slate-100">
                  <span class="font-medium text-slate-700 w-10" x-text="v.version"></span>
                  <span class="text-slate-400" x-text="v.bump_type"></span>
                  <span class="text-slate-500 flex-1" x-text="v.note || ''"></span>
                  <span class="text-slate-400" x-text="v.bumped_at ? fmtDate(v.bumped_at) : ''"></span>
                </div>
              </template>
            </div>
          </div>
        </div>
      </template>
    </div>

    <div class="flex-1 flex items-center justify-center text-slate-400 text-sm" x-show="!selectedContract">
      Select a contract to view details
    </div>
  </div>
</div>
